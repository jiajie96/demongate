<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Hellfire gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0e0308;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a1a;stop-opacity:1"/>
    </linearGradient>
    <!-- Fire glow for title -->
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b1a"/>
      <stop offset="40%" style="stop-color:#cc2200"/>
      <stop offset="100%" style="stop-color:#880011"/>
    </linearGradient>
    <!-- Lava gradient -->
    <linearGradient id="lavaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc2200;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff4400;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#cc2200;stop-opacity:0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern (highground reference) -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="650" y1="0" x2="650" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="850" y1="0" x2="850" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="900" y2="50" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="900" y2="250" stroke="#8833aa" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#8833aa" stroke-width="0.5"/>
  </g>

  <!-- Border frame -->
  <rect x="4" y="4" width="892" height="312" fill="none" stroke="#cc2200" stroke-width="2" rx="2"/>
  <rect x="8" y="8" width="884" height="304" fill="none" stroke="#661100" stroke-width="1" rx="1"/>

  <!-- Lava line accents -->
  <rect x="100" y="50" width="700" height="2" fill="url(#lavaGrad)" opacity="0.6"/>
  <rect x="100" y="268" width="700" height="2" fill="url(#lavaGrad)" opacity="0.6"/>

  <!-- Left flame cluster -->
  <g filter="url(#glow)">
    <polygon points="55,230 35,100 75,230" fill="#cc2200" opacity="0.7"/>
    <polygon points="65,230 50,80 80,230" fill="#ff4400" opacity="0.5"/>
    <polygon points="58,230 48,120 68,230" fill="#ff8800" opacity="0.4"/>
    <polygon points="40,230 25,140 55,230" fill="#cc2200" opacity="0.5"/>
    <polygon points="80,230 70,130 90,230" fill="#ff4400" opacity="0.4"/>
  </g>

  <!-- Right flame cluster -->
  <g filter="url(#glow)">
    <polygon points="845,230 825,100 865,230" fill="#cc2200" opacity="0.7"/>
    <polygon points="835,230 820,80 850,230" fill="#ff4400" opacity="0.5"/>
    <polygon points="842,230 832,120 852,230" fill="#ff8800" opacity="0.4"/>
    <polygon points="860,230 850,140 870,230" fill="#cc2200" opacity="0.5"/>
    <polygon points="820,230 810,130 830,230" fill="#ff4400" opacity="0.4"/>
  </g>

  <!-- Central pentagram/hellgate symbol -->
  <g filter="url(#strongGlow)" transform="translate(450, 75)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#cc2200" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#ff4400" stroke-width="1" opacity="0.3"/>
    <!-- Pentagram star -->
    <polygon points="0,-35 8,-11 33,-11 13,4 20,28 0,14 -20,28 -13,4 -33,-11 -8,-11"
             fill="#cc2200" fill-opacity="0.3" stroke="#ff4400" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner circle (Hell's Core) -->
    <circle cx="0" cy="0" r="14" fill="#880011" stroke="#ff4400" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#cc2200"/>
    <circle cx="0" cy="0" r="4" fill="#ff6633"/>
  </g>

  <!-- TITLE: HELLGATE -->
  <!-- Title shadow (behind) -->
  <text x="452" y="172" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" letter-spacing="8" fill="#220000" opacity="0.5">HELLGATE</text>
  <g filter="url(#strongGlow)">
    <text x="450" y="170" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" letter-spacing="8" fill="url(#fireGrad)">HELLGATE</text>
  </g>

  <!-- TITLE: DEFENDERS -->
  <g filter="url(#glow)">
    <text x="450" y="220" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" letter-spacing="14" fill="#ff8844">DEFENDERS</text>
  </g>

  <!-- Subtitle -->
  <text x="450" y="252" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#aa6644" letter-spacing="2">DEFEND HELL'S CORE AGAINST THE DIVINE CRUSADE</text>

  <!-- Tower icons (left side) -->
  <g transform="translate(130, 140)" filter="url(#softGlow)">
    <!-- Demon Archer -->
    <circle cx="0" cy="0" r="15" fill="#331010" stroke="#cc3333" stroke-width="1.5"/>
    <circle cx="0" cy="-3" r="4" fill="#cc3333"/>
    <line x1="-3" y1="-7" x2="-5" y2="-13" stroke="#dd4411" stroke-width="2"/>
    <line x1="3" y1="-7" x2="5" y2="-13" stroke="#dd4411" stroke-width="2"/>
    <circle cx="-2" cy="-4" r="1" fill="#ffcc00"/>
    <circle cx="2" cy="-4" r="1" fill="#ffcc00"/>
    <text x="0" y="28" text-anchor="middle" font-family="monospace" font-size="9" fill="#cc4444">ARC</text>
  </g>

  <g transform="translate(180, 150)" filter="url(#softGlow)">
    <!-- Hellfire Mage -->
    <circle cx="0" cy="0" r="15" fill="#1a0825" stroke="#9933cc" stroke-width="1.5"/>
    <polygon points="0,-15 6,-3 -6,-3" fill="#6622aa"/>
    <circle cx="0" cy="-3" r="4" fill="#7733bb"/>
    <circle cx="-2" cy="-4" r="1" fill="#cc88ff"/>
    <circle cx="2" cy="-4" r="1" fill="#cc88ff"/>
    <circle cx="-7" cy="-8" r="2.5" fill="#ff8811"/>
    <circle cx="-7" cy="-8" r="4" fill="#ff8811" opacity="0.3"/>
    <text x="0" y="28" text-anchor="middle" font-family="monospace" font-size="9" fill="#9944cc">MAG</text>
  </g>

  <g transform="translate(215, 145)" filter="url(#softGlow)">
    <!-- Necromancer -->
    <circle cx="0" cy="0" r="15" fill="#0a1a0e" stroke="#33cc66" stroke-width="1.5"/>
    <polygon points="0,-14 6,-3 -6,-3" fill="#1a4422"/>
    <circle cx="0" cy="-3" r="4" fill="#ddddcc"/>
    <circle cx="-2" cy="-4" r="1.2" fill="#22ff55"/>
    <circle cx="2" cy="-4" r="1.2" fill="#22ff55"/>
    <circle cx="7" cy="-10" r="3" fill="#33ee66"/>
    <circle cx="7" cy="-10" r="5" fill="#33ee66" opacity="0.2"/>
    <text x="0" y="28" text-anchor="middle" font-family="monospace" font-size="9" fill="#44cc66">NEC</text>
  </g>

  <g transform="translate(260, 140)" filter="url(#softGlow)">
    <!-- Lucifer -->
    <circle cx="0" cy="0" r="15" fill="#1a0800" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ff4400" stroke-width="0.5" opacity="0.4"/>
    <circle cx="0" cy="-3" r="4" fill="#331005"/>
    <line x1="-4" y1="-7" x2="-7" y2="-15" stroke="#ff5500" stroke-width="2.5"/>
    <line x1="4" y1="-7" x2="7" y2="-15" stroke="#ff5500" stroke-width="2.5"/>
    <circle cx="-2" cy="-4" r="1.2" fill="#ffaa00"/>
    <circle cx="2" cy="-4" r="1.2" fill="#ffaa00"/>
    <polygon points="-8,-1 -15,-8 -13,-2 -10,3" fill="#220500" opacity="0.7"/>
    <polygon points="8,-1 15,-8 13,-2 10,3" fill="#220500" opacity="0.7"/>
    <text x="0" y="28" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff6600">LUC</text>
  </g>

  <g transform="translate(305, 148)" filter="url(#softGlow)">
    <!-- Hades -->
    <circle cx="0" cy="0" r="15" fill="#080520" stroke="#4433ee" stroke-width="1.5"/>
    <circle cx="0" cy="-3" r="4" fill="#1a1040"/>
    <line x1="-3" y1="-7" x2="-4" y2="-15" stroke="#5544ee" stroke-width="2"/>
    <line x1="3" y1="-7" x2="4" y2="-15" stroke="#5544ee" stroke-width="2"/>
    <circle cx="-2" cy="-4" r="1.2" fill="#8877ff"/>
    <circle cx="2" cy="-4" r="1.2" fill="#8877ff"/>
    <circle cx="7" cy="-10" r="3" fill="#5544ee"/>
    <circle cx="7" cy="-10" r="5" fill="#5544ee" opacity="0.2"/>
    <text x="0" y="28" text-anchor="middle" font-family="monospace" font-size="9" fill="#5544ee">HAD</text>
  </g>

  <!-- Enemy icons (right side) -->
  <g transform="translate(635, 145)" filter="url(#softGlow)">
    <!-- Angel Scout -->
    <circle cx="0" cy="0" r="8" fill="#ffdd44"/>
    <polygon points="-8,0 -13,-4 -10,2" fill="#ffee88"/>
    <polygon points="8,0 13,-4 10,2" fill="#ffee88"/>
    <ellipse cx="0" cy="-10" rx="4" ry="1.5" fill="none" stroke="#ffff99" stroke-width="1"/>
  </g>

  <g transform="translate(665, 140)" filter="url(#softGlow)">
    <!-- Holy Knight -->
    <circle cx="0" cy="0" r="10" fill="#cccccc"/>
    <line x1="0" y1="-4" x2="0" y2="5" stroke="#ccaa33" stroke-width="1.5"/>
    <line x1="-3" y1="1" x2="3" y2="1" stroke="#ccaa33" stroke-width="1.5"/>
  </g>

  <g transform="translate(700, 135)" filter="url(#softGlow)">
    <!-- Paladin Boss -->
    <circle cx="0" cy="0" r="14" fill="#ffcc00" stroke="#ffee66" stroke-width="1"/>
    <circle cx="0" cy="0" r="9" fill="#ddaa00"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#ffffcc" stroke-width="2"/>
    <line x1="-5" y1="-1" x2="5" y2="-1" stroke="#ffffcc" stroke-width="2"/>
    <polygon points="-8,-2 -14,-8 -12,-3 -10,2" fill="#ffeeaa" opacity="0.8"/>
    <polygon points="8,-2 14,-8 12,-3 10,2" fill="#ffeeaa" opacity="0.8"/>
    <line x1="-3" y1="-14" x2="-2" y2="-18" stroke="#ffcc44" stroke-width="1.5"/>
    <line x1="0" y1="-14" x2="0" y2="-19" stroke="#ffcc44" stroke-width="1.5"/>
    <line x1="3" y1="-14" x2="2" y2="-18" stroke="#ffcc44" stroke-width="1.5"/>
  </g>

  <g transform="translate(740, 142)" filter="url(#softGlow)">
    <!-- God of War -->
    <circle cx="0" cy="0" r="11" fill="#ff8844"/>
    <polygon points="0,-16 2,-10 -2,-10" fill="#ee6611"/>
    <line x1="4" y1="-3" x2="8" y2="-10" stroke="#ddddee" stroke-width="2"/>
  </g>

  <g transform="translate(775, 135)" filter="url(#softGlow)">
    <!-- Michael (Boss) -->
    <circle cx="0" cy="0" r="13" fill="#fff5dd" stroke="#ffee88" stroke-width="1"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#ffee66" stroke-width="0.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="#eedd88"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffffee" stroke-width="2"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#ffffee" stroke-width="2"/>
    <polygon points="-8,-2 -14,-8 -12,-3 -10,2" fill="#ffeecc" opacity="0.8"/>
    <polygon points="8,-2 14,-8 12,-3 10,2" fill="#ffeecc" opacity="0.8"/>
    <line x1="4" y1="-2" x2="7" y2="-9" stroke="#ffddaa" stroke-width="1.5"/>
    <ellipse cx="0" cy="-14" rx="5" ry="2" fill="none" stroke="#ffee88" stroke-width="1"/>
  </g>

  <g transform="translate(815, 145)" filter="url(#softGlow)">
    <!-- Zeus -->
    <circle cx="0" cy="0" r="10" fill="#b3ccff" stroke="#88aaff" stroke-width="1"/>
    <line x1="-1" y1="-4" x2="2" y2="-1" stroke="#ffff88" stroke-width="2"/>
    <line x1="2" y1="-1" x2="-1" y2="1" stroke="#ffff88" stroke-width="2"/>
    <line x1="-1" y1="1" x2="1" y2="4" stroke="#ffff88" stroke-width="2"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#88aaff" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- "VS" divider ornament -->
  <g opacity="0.4">
    <line x1="300" y1="130" x2="300" y2="190" stroke="#661100" stroke-width="1"/>
    <rect x="296" y="156" width="8" height="8" fill="#661100" transform="rotate(45 300 160)"/>
    <line x1="600" y1="130" x2="600" y2="190" stroke="#661100" stroke-width="1"/>
  </g>

  <!-- Labels -->
  <text x="215" y="115" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#cc4444" letter-spacing="2" opacity="0.7">YOUR TOWERS</text>
  <text x="720" y="115" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ddaa44" letter-spacing="2" opacity="0.7">DIVINE ENEMIES</text>

  <!-- Bottom tagline area -->
  <text x="450" y="300" text-anchor="middle" font-family="monospace" font-size="10" fill="#553322" letter-spacing="1">5 Towers  |  10 Enemies  |  Gambling  |  20 Waves  |  Godot 4.6</text>

  <!-- Corner ornaments -->
  <polygon points="20,20 35,20 20,35" fill="#cc2200" opacity="0.3"/>
  <polygon points="880,20 865,20 880,35" fill="#cc2200" opacity="0.3"/>
  <polygon points="20,300 35,300 20,285" fill="#cc2200" opacity="0.3"/>
  <polygon points="880,300 865,300 880,285" fill="#cc2200" opacity="0.3"/>
</svg>
